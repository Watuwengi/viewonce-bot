<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp QR Codes</title>
  <script>
    (function() {
      if (location.protocol !== 'file:') return;
      const ports = [3001, 3000, 3002, 3003];
      const target = ports.map((port) => `http://localhost:${port}/`);
      const message = document.createElement('div');
      message.id = 'server-redirect-message';
      message.style = 'position:fixed;top:0;left:0;right:0;padding:14px 16px;background:#f59e0b;color:#0f172a;font-weight:700;z-index:9999;text-align:center;';
      message.innerHTML = 'Opening the live UI server... If this does not happen automatically, use <a href="http://localhost:3001" style="color:#0f172a;text-decoration:underline;">http://localhost:3001</a> or <a href="http://localhost:3000" style="color:#0f172a;text-decoration:underline;">http://localhost:3000</a>.';
      document.addEventListener('DOMContentLoaded', () => document.body.appendChild(message));
      let redirected = false;
      for (const url of target) {
        if (redirected) break;
        try {
          location.href = url;
          redirected = true;
          break;
        } catch (_) {
          continue;
        }
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      margin: 0;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 1.8rem;
    }
    p {
      margin-top: 0;
      color: #cbd5e1;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      word-break: break-all;
    }
    .card img {
      width: 100%;
      border-radius: 12px;
      background: white;
      display: block;
    }
    .empty {
      background: #111827;
      border: 1px dashed #475569;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      color: #94a3b8;
    }
    .status {
      margin-top: 12px;
      color: #93c5fd;
      font-size: 0.95rem;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      align-items: center;
    }
    .toolbar input {
      flex: 1;
      min-width: 220px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #020617;
      color: #f8fafc;
    }
    .toolbar button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .toolbar .primary { background: #22c55e; color: #052e16; }
    .toolbar .danger { background: #ef4444; color: white; }
    .toolbar .secondary { background: #334155; color: white; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .actions button { padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; }
    .actions .start { background: #22c55e; color: #052e16; }
    .actions .remove { background: #ef4444; color: white; }
    .users { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: #1e293b; border: 1px solid #475569; padding: 8px 10px; border-radius: 999px; font-size: 0.9rem; }
    .message { margin-top: 12px; color: #fbbf24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WhatsApp QR Codes</h1>
    <p>Open this page in your browser to view the latest QR codes from the bot sessions.</p>

    <div class="toolbar">
      <input id="number-input" placeholder="Enter phone number e.g. 254712345678" />
      <button class="primary" id="add-user-btn">Add account</button>
      <button class="secondary" id="start-all-btn">Start all</button>
      <button class="danger" id="clear-all-btn">Remove all sessions</button>
    </div>
    <div id="message" class="message"></div>
    <div id="users-list" class="users"></div>
    <div id="qr-list"></div>
  </div>

  <script>
    const listEl = document.getElementById('qr-list');
    const usersListEl = document.getElementById('users-list');
    const numberInput = document.getElementById('number-input');
    const messageEl = document.getElementById('message');

    function setMessage(text) {
      messageEl.textContent = text;
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/users');
        const users = await res.json();
        usersListEl.innerHTML = '';
        if (!users.length) {
          usersListEl.innerHTML = '<div class="chip">No saved accounts yet</div>';
          return;
        }
        users.forEach((user) => {
          const chip = document.createElement('div');
          chip.className = 'chip';
          chip.textContent = user.number;
          usersListEl.appendChild(chip);
        });
      } catch (error) {
        usersListEl.innerHTML = '<div class="chip">Unable to load account list</div>';
      }
    }

    async function loadQrs() {
      try {
        const res = await fetch('/api/qrs');
        const qrs = await res.json();
        if (!qrs.length) {
          listEl.innerHTML = '<div class="empty">No QR codes are available yet. Start a session and scan the code from the bot.</div>';
          return;
        }

        listEl.innerHTML = '<div class="grid"></div>';
        const grid = listEl.querySelector('.grid');

        qrs.forEach((qr) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h2>${qr.name}</h2>
            <img src="${qr.dataUrl}" alt="QR code for ${qr.name}" />
            <div class="actions">
              <button class="start" data-number="${qr.name}">Start</button>
              <button class="remove" data-number="${qr.name}">Remove</button>
            </div>
            <div class="status">Updated automatically</div>
          `;
          grid.appendChild(card);
        });
      } catch (error) {
        listEl.innerHTML = '<div class="empty">Unable to load QR codes right now.</div>';
      }
    }

    async function addUser() {
      const number = numberInput.value.trim();
      if (!number) {
        setMessage('Enter a phone number first.');
        return;
      }
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number })
      });
      const data = await res.json();
      setMessage(data.ok ? `Added ${number}` : data.message || 'Unable to add account');
      numberInput.value = '';
      await loadUsers();
      await loadQrs();
    }

    async function startSession(number) {
      const res = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number })
      });
      const data = await res.json();
      setMessage(data.ok ? `Started ${number}` : data.message || 'Unable to start session');
      await loadQrs();
    }

    async function removeSession(number) {
      const res = await fetch('/api/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number })
      });
      const data = await res.json();
      setMessage(data.ok ? `Removed ${number}` : data.message || 'Unable to remove session');
      await loadUsers();
      await loadQrs();
    }

    async function startAllSessions() {
      const res = await fetch('/api/users');
      const users = await res.json();
      if (!users.length) {
        setMessage('No saved accounts to start.');
        return;
      }
      setMessage('Starting all saved sessions...');
      for (const user of users) {
        await startSession(user.number);
      }
      setMessage('All saved sessions were requested to start.');
    }

    async function clearAllSessions() {
      const res = await fetch('/api/users');
      const users = await res.json();
      if (!users.length) {
        setMessage('No saved accounts to remove.');
        return;
      }
      for (const user of users) {
        await removeSession(user.number);
      }
      setMessage('All sessions and saved accounts were removed.');
    }

    document.getElementById('add-user-btn').addEventListener('click', addUser);
    document.getElementById('start-all-btn').addEventListener('click', startAllSessions);
    document.getElementById('clear-all-btn').addEventListener('click', clearAllSessions);

    listEl.addEventListener('click', (event) => {
      const button = event.target.closest('button');
      if (!button) return;
      const number = button.getAttribute('data-number');
      if (!number) return;
      if (button.classList.contains('start')) {
        startSession(number);
      } else if (button.classList.contains('remove')) {
        removeSession(number);
      }
    });

    loadUsers();
    loadQrs();
    setInterval(loadUsers, 8000);
    setInterval(loadQrs, 4000);
  </script>
</body>
</html>
